apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: rclone-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rclone-server-cert
spec:
  secretName: rclone-server-tls
  commonName: rclone-server
  dnsNames:
    - rclone-server
  issuerRef:
    name: rclone-issuer
    kind: Issuer
