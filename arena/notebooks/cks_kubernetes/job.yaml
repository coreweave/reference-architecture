apiVersion: batch/v1
kind: Job
metadata:
  name: arena-k8s-job
  labels:
    app.kubernetes.io/part-of: arena-k8s-lab
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: arena-k8s-lab
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["/bin/sh", "-c", "echo hello-from-cks; sleep 3; echo completed"]
